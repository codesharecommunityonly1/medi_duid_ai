name: mediguide_ai
description: "Offline Emergency Medical First-Aid Assistant - AI-powered first aid guidance with voice input, camera analysis, and emergency SOS."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  get_it: ^9.2.1
  uuid: ^4.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  speech_to_text: ^7.0.0
  flutter_tts: 4.0.2
  camera: 0.10.5+9
  rxdart: ^0.28.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/data/
    - assets/icons/
