name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "sync@mediguide.ai"
          git config user.name "GitHub to HF Sync"
          git remote add hf https://VINAYAKKUMA:${HF_TOKEN}@huggingface.co/spaces/VINAYAKKUMA/MED_GUID_AI.git
          git push hf main --force
