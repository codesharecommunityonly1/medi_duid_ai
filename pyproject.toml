[project]
name = "mediguide_ai"
version = "1.0.0"
description = "OpenEnv-Compatible RL Medical Diagnosis Environment"
authors = [{name = "Vinayak Kumar"}]
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.29.0",
    "pydantic>=2.0.0",
    "gradio>=4.0.0",
    "requests>=2.31.0",
    "openenv-core>=0.2.0",
]

[project.optional-dependencies]
dev = ["pytest"]

[project.scripts]
mediguide = "inference:app"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"
