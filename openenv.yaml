spec_version: 1
name: mediguide
type: space
runtime: docker
app: inference:app
port: 7860

tasks:
  - id: 1
    name: simple_diagnosis
    difficulty: easy
    description: Diagnose common symptoms (fever, chills, headache)
    grading:
      min_score: 0.0
      max_score: 1.0
      criteria: Returns valid diagnosis with at least 1 disease
  - id: 2
    name: emergency_detection
    difficulty: medium
    description: Detect emergency conditions (chest pain, breathing difficulty)
    grading:
      min_score: 0.0
      max_score: 1.0
      criteria: Identifies HIGH or CRITICAL severity conditions
  - id: 3
    name: treatment_recommendation
    difficulty: hard
    description: Recommend proper treatment and emergency steps
    grading:
      min_score: 0.0
      max_score: 1.0
      criteria: Provides emergency_steps with actionable guidance

api:
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health

environment:
  type: medical-diagnosis
  observation_space:
    - episode_id
    - step_count
    - query
    - diagnoses
    - emergency_steps
    - message
  action_space:
    - symptoms
    - query_type

reward:
  partial_progress: true
  max_episode_steps: 100