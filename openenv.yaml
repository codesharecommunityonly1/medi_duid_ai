# MediGuide AI - OpenEnv Configuration
version: "1.0"
name: mediguide_ai
description: RL-powered Emergency Medical Assistant for Rural India
author: Vinayak Kumar
tags:
  - medical
  - healthcare
  - emergency
  - rl
  - hindi

# Tasks Definition (3 tasks: easy, medium, hard)
tasks:
  - id: 1
    name: simple_diagnosis
    difficulty: easy
    description: Diagnose common symptoms (fever, chills, headache)
    grading:
      min_score: 0.0
      max_score: 1.0
      criteria: Returns valid diagnosis with at least 1 disease
  - id: 2
    name: emergency_detection
    difficulty: medium
    description: Detect emergency conditions (chest pain, breathing difficulty)
    grading:
      min_score: 0.0
      max_score: 1.0
      criteria: Identifies HIGH or CRITICAL severity conditions
  - id: 3
    name: treatment_recommendation
    difficulty: hard
    description: Recommend proper treatment and emergency steps
    grading:
      min_score: 0.0
      max_score: 1.0
      criteria: Provides emergency_steps with actionable guidance

# API Configuration
api:
  url: https://vinayakkuma-med-guid-ai.hf.space
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health

# Environment Specification
environment:
  type: medical-diagnosis
  observation_space:
    - episode_id
    - step_count
    - query
    - diagnoses
    - emergency_steps
    - message
  action_space:
    - symptoms
    - query_type

# Reward function
reward:
  partial_progress: true
  max_episode_steps: 100

# Diseases supported
diseases:
  - malaria
  - dengue
  - typhoid
  - pneumonia
  - heart_attack
  - snake_bite
  - heatstroke
  - cholera